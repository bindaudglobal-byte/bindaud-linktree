  <style>
  :root {
    --bg: #0b0c10;
    --bg-2: #1f2833;
    --accent: #45a29e;
    --accent-glow: rgba(69, 162, 158, 0.35);
    --text: #c5c6c7;
    --text-heading: #66fcf1;
    --glass-bg: rgba(31, 40, 51, 0.45);
    --glass-border: rgba(102, 252, 241, 0.15);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .ll-page {
    min-height:100vh;
    width:100%;
    background:radial-gradient(circle at top,#1f2833,#0b0c10);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0;
    overflow-x:hidden;
  }

  .ll-page::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2345a29e' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

 .ll-banner{
    width:100%;
    max-width:100%;
    height:320px;
    margin-top:25px;      /* Move banner down */
    overflow:hidden;
    border-radius:24px;   /* Makes all four corners rounded */
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}
  .ll-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, transparent 40%, rgba(102,252,241,0.06) 50%, transparent 60%);
  }
  .ll-banner img {
    width:100%;
    height:100%;
    object-fit:cover;         /* makes image sharp */
    object-position:center 30%;
  }

  .ll-avatar-wrap {
    margin-top:-75px;
  }
  .ll-avatar {
    width:clamp(100px,18vw,140px);
    height:clamp(100px,18vw,140px);
    border-radius: 50%;
    border: 4px solid var(--bg);
    box-shadow: 0 0 0 2px var(--accent), 0 8px 24px rgba(0,0,0,0.6);
    object-fit: cover;
    background: var(--bg-2);
  }

  .ll-name {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-heading);
    margin: 14px 0 4px;
    text-align: center;
    letter-spacing: 0.5px;
    animation: fadeInUp 0.8s ease-out 0.3s both;
  }
  .ll-handle {
    font-size: 0.9rem;
    color: var(--accent);
    margin-bottom: 24px;
    text-align: center;
    animation: fadeInUp 0.8s ease-out 0.35s both;
  }

  .ll-links {
     width: min(94%, 650px);
    display: flex;
    flex-direction: column;
    gap: 16px;
    display: flex;
    z-index: 1;
  }

  .ll-btn {
    display: flex;
    align-items: center;
    gap: 14px;
   padding: 18px 24px;
    border-radius: 16px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    color: var(--text);
    text-decoration: none;
    font-size: clamp(16px,2vw,20px);
    min-height:72px;
    font-weight: 500;
    box-shadow: var(--shadow);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s ease,
                border-color 0.3s ease,
                background 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.6s ease-out both;
  }
  .ll-btn:nth-child(1) { animation-delay: 0.4s; }
  .ll-btn:nth-child(2) { animation-delay: 0.48s; }
  .ll-btn:nth-child(3) { animation-delay: 0.56s; }
  .ll-btn:nth-child(4) { animation-delay: 0.64s; }
  .ll-btn:nth-child(5) { animation-delay: 0.72s; }
  .ll-btn:nth-child(6) { animation-delay: 0.80s; }
  .ll-btn:nth-child(7) { animation-delay: 0.88s; }
  .ll-btn:nth-child(8) { animation-delay: 0.96s; }

  .ll-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(102,252,241,0.08), transparent);
    transition: left 0.5s ease;
  }
  .ll-btn:hover::before {
    left: 100%;
  }
  .ll-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 20px var(--accent-glow);
    border-color: rgba(102, 252, 241, 0.35);
    background: rgba(31, 40, 51, 0.6);
  }
  .ll-btn:active {
    transform: translateY(0) scale(0.98);
  }

  .ll-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }
  .ll-btn:hover .ll-icon {
    transform: scale(1.15) rotate(-5deg);
  }

  .ll-icon svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .ll-label {
    flex: 1;
  }
  .ll-arrow {
    opacity: 0.5;
    transition: opacity 0.3s, transform 0.3s;
  }
  .ll-btn:hover .ll-arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  .ll-footer {
    margin-top: 32px;
    font-size: 0.75rem;
    color: rgba(197,198,199,0.4);
    text-align: center;
    z-index: 1;
    animation: fadeInUp 0.8s ease-out 1.1s both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
